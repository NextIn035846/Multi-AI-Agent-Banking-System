version: '3.8'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BANKING_API_URL=${BANKING_API_URL}
    volumes:
      - ./data:/app/data
    depends_on:
      - vectordb
      - banking-api

  vectordb:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - vectordb_data:/qdrant/storage

  banking-api:
    image: banking-api:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}

volumes:
  vectordb_data:
